services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: gamepanel-lite-api:local
    environment:
      GAMEPANEL_HOST: 0.0.0.0
      GAMEPANEL_PORT: 4000
      GAMEPANEL_DATA_DIR: ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}/data
      GAMEPANEL_DB_PATH: ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}/data/gamepanel.db
      GAMEPANEL_DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4000:4000"
    volumes:
      - ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}:${GAMEPANEL_WORKSPACE_PATH:-${PWD}}
      - ${GAMEPANEL_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    image: gamepanel-lite-web:local
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    depends_on:
      - api
    ports:
      - "3001:3000"
