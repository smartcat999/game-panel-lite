services:
  api:
    image: golang:1.25-bookworm
    working_dir: ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}
    command: sh -lc "/usr/local/go/bin/go run ./apps/api/cmd/server"
    environment:
      GAMEPANEL_HOST: 0.0.0.0
      GAMEPANEL_PORT: 4000
      GAMEPANEL_DATA_DIR: ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}/data
      GAMEPANEL_DB_PATH: ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}/data/gamepanel.db
      GAMEPANEL_DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4000:4000"
    volumes:
      - ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}:${GAMEPANEL_WORKSPACE_PATH:-${PWD}}
      - ${GAMEPANEL_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

  web:
    image: node:20-bookworm
    working_dir: ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @gamepanel-lite/web dev --hostname 0.0.0.0"
    environment:
      CI: "1"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    depends_on:
      - api
    ports:
      - "3001:3000"
    volumes:
      - ${GAMEPANEL_WORKSPACE_PATH:-${PWD}}:${GAMEPANEL_WORKSPACE_PATH:-${PWD}}
