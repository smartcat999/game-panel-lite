openapi: 3.1.0
info:
  title: GamePanel Lite API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/version:
    get:
      summary: Product version
      responses:
        "200":
          description: Product version
  /api/runtime/docker:
    get:
      summary: Read cached Docker runtime availability
      responses:
        "200":
          description: Docker status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DockerStatus"
  /api/settings:
    get:
      summary: Read local API settings
      responses:
        "200":
          description: Local settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
  /api/settings/locale:
    put:
      summary: Update persisted UI language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale:
                  type: string
                  enum: [zh, en]
      responses:
        "200":
          description: Saved locale
          content:
            application/json:
              schema:
                type: object
                required: [locale]
                properties:
                  locale:
                    type: string
                    enum: [zh, en]
  /api/activity:
    get:
      summary: List recent activity events
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
  /api/monitoring/overview:
    get:
      summary: Read productized monitoring overview
      responses:
        "200":
          description: Monitoring overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringOverview"
  /api/monitoring/metrics:
    get:
      summary: Read global Prometheus-backed time-series metrics
      parameters:
        - name: range
          in: query
          schema:
            type: string
            default: 15m
        - name: step
          in: query
          schema:
            type: string
            default: 30s
      responses:
        "200":
          description: Global monitoring metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringMetrics"
  /api/monitoring/server-load:
    get:
      summary: Read server load table data
      responses:
        "200":
          description: Server load rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerLoadResponse"
  /api/monitoring/events:
    get:
      summary: Read monitoring event stream
      responses:
        "200":
          description: Monitoring events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringEvents"
  /api/monitoring/platform:
    get:
      summary: Read platform health and traffic metrics
      responses:
        "200":
          description: Platform monitoring metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformMonitoring"
  /api/servers:
    get:
      summary: List servers
      responses:
        "200":
          description: Server list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameServer"
    post:
      summary: Create server
      description: Creates a server resource with desired state stopped. Runtime reconciliation is handled asynchronously by the server controller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Created server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
  /api/servers/{id}:
    get:
      summary: Get server
      responses:
        "200":
          description: Server detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
    delete:
      summary: Queue async server deletion
      description: Sets spec.desiredState to deleted and returns the deleting resource. The controller stops/removes runtime resources and then deletes the record.
      responses:
        "202":
          description: Delete accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
  /api/servers/{id}/config:
    put:
      summary: Update desired server configuration
      description: Updates spec.config/spec.network/spec.resources, bumps spec.generation, and lets the controller apply changes asynchronously.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerConfigRequest"
      responses:
        "200":
          description: Updated server config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
  /api/servers/{id}/start:
    post:
      summary: Request server start
      description: Sets spec.desiredState to running and bumps spec.generation. The controller creates or updates runtime workload asynchronously.
      responses:
        "202":
          description: Start accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
  /api/servers/{id}/stop:
    post:
      summary: Request server stop
      description: Sets spec.desiredState to stopped and bumps spec.generation. Runtime stop is handled asynchronously by the controller.
      responses:
        "202":
          description: Stop accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
  /api/servers/{id}/restart:
    post:
      summary: Request server restart
      description: Keeps spec.desiredState running and bumps spec.generation so the controller recreates/applies the workload.
      responses:
        "202":
          description: Restart accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameServer"
  /api/servers/{id}/command:
    post:
      summary: Send a console command to a running server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  maxLength: 200
      responses:
        "200":
          description: Command sent
        "409":
          description: Server is not running
  /api/servers/{id}/logs:
    get:
      summary: Stream server logs with SSE
      responses:
        "200":
          description: SSE log stream
  /api/servers/{id}/logs/snapshot:
    get:
      summary: Read recent server log lines without following the live stream
      responses:
        "200":
          description: Recent log lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogSnapshot"
  /api/servers/{id}/stats:
    get:
      summary: Read runtime CPU and memory stats for a running server
      responses:
        "200":
          description: Runtime stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"
  /api/servers/{id}/metrics:
    get:
      summary: Read server-specific Prometheus-backed time-series metrics
      responses:
        "200":
          description: Server monitoring metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringMetrics"
  /api/servers/{id}/events:
    get:
      summary: Read server-specific monitoring events
      responses:
        "200":
          description: Server monitoring events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringEvents"
  /api/servers/{id}/mods:
    get:
      summary: List tModLoader mods
      responses:
        "200":
          description: Mod list
  /api/servers/{id}/mods/upload:
    post:
      summary: Upload tModLoader mod metadata or .tmod file
      responses:
        "200":
          description: Updated existing mod file record
        "201":
          description: Uploaded mod file
  /api/servers/{id}/mods/workshop:
    post:
      summary: Import tModLoader Workshop IDs as server mod records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workshopIds]
              properties:
                workshopIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Imported Workshop mod records; runtime install.txt is generated when the server starts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModFile"
  /api/servers/{id}/mods/{modId}:
    patch:
      summary: Enable or disable a tModLoader mod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated mod state
    delete:
      summary: Delete tModLoader mod file
      responses:
        "200":
          description: Deleted mod
  /api/mods:
    get:
      summary: List unassigned global mod library files
      responses:
        "200":
          description: Global mod library
  /api/mods/upload:
    post:
      summary: Upload a mod to the global mod library
      responses:
        "200":
          description: Updated existing global mod file record
        "201":
          description: Uploaded global mod
  /api/mods/workshop:
    post:
      summary: Import tModLoader Workshop IDs as global mod library records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workshopIds]
              properties:
                workshopIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Imported Workshop mod records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModFile"
  /api/mods/{id}/assign:
    post:
      summary: Copy a global mod library item to a tModLoader server
      responses:
        "200":
          description: Updated existing assigned mod file record
        "201":
          description: Assigned mod
  /api/mods/{id}:
    delete:
      summary: Delete an unassigned global mod library item
      responses:
        "200":
          description: Deleted global mod
  /api/mod-packs:
    get:
      summary: List reusable tModLoader mod packs
      responses:
        "200":
          description: Mod pack list
    post:
      summary: Create a reusable tModLoader mod pack from global mod library items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, modIds]
              properties:
                name:
                  type: string
                description:
                  type: string
                modIds:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created mod pack
  /api/mod-packs/{id}:
    delete:
      summary: Delete a reusable tModLoader mod pack
      responses:
        "200":
          description: Deleted mod pack
  /api/worlds:
    get:
      summary: List worlds
      responses:
        "200":
          description: World list
  /api/worlds/import:
    post:
      summary: Import .wld world file
      responses:
        "200":
          description: Updated existing world file record
        "201":
          description: Imported world
  /api/worlds/{id}/assign:
    post:
      summary: Assign world to server
      responses:
        "200":
          description: Assigned world
  /api/worlds/{id}/download:
    get:
      summary: Download world file
      responses:
        "200":
          description: World file
  /api/worlds/{id}:
    delete:
      summary: Delete world file
      responses:
        "200":
          description: Deleted world
  /api/backups:
    get:
      summary: List backups
      responses:
        "200":
          description: Backup list
  /api/servers/{id}/backups:
    post:
      summary: Create manual backup
      responses:
        "201":
          description: Created backup
  /api/backups/{id}/restore:
    post:
      summary: Restore backup
      responses:
        "200":
          description: Restored backup
  /api/backups/{id}/download:
    get:
      summary: Download backup archive
      responses:
        "200":
          description: Backup archive
  /api/backups/{id}:
    delete:
      summary: Delete backup
      responses:
        "200":
          description: Deleted backup
  /api/terraria/presets:
    get:
      summary: List Terraria server presets
      responses:
        "200":
          description: Presets
  /api/terraria/versions:
    get:
      summary: List supported provider versions
      responses:
        "200":
          description: Version lists keyed by provider
  /api/terraria/config/preview:
    post:
      summary: Render serverconfig.txt preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  $ref: "#/components/schemas/TerrariaConfig"
      responses:
        "200":
          description: Rendered config
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverconfig:
                    type: string
        "400":
          description: Invalid config
components:
  schemas:
    DockerStatus:
      type: object
      required: [available, message, host, lastCheckedAt]
      properties:
        available:
          type: boolean
        message:
          type: string
        host:
          type: string
        lastCheckedAt:
          type: string
          format: date-time
    AppSettings:
      type: object
      required: [host, port, dataDir, dbPath, dockerHost, publicHost, locale]
      properties:
        host:
          type: string
        port:
          type: string
        dataDir:
          type: string
        dbPath:
          type: string
        dockerHost:
          type: string
        publicHost:
          type: string
        locale:
          type: string
          enum: [zh, en]
    ActivityEvent:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: string
        instanceId:
          type: string
        type:
          type: string
        message:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    CreateServerRequest:
      type: object
      required: [providerKey, config]
      properties:
        name:
          type: string
        providerKey:
          $ref: "#/components/schemas/ProviderKey"
        config:
          type: object
          description: Provider-specific game configuration. Terraria providers use TerrariaConfig.
          oneOf:
            - $ref: "#/components/schemas/TerrariaConfig"
        hostPort:
          type: integer
          minimum: 0
          maximum: 65535
          description: External host port. Zero or omitted means auto assign.
        version:
          type: string
        resources:
          $ref: "#/components/schemas/ResourceLimits"
    UpdateServerConfigRequest:
      type: object
      required: [config]
      properties:
        config:
          type: object
          description: Provider-specific game configuration. Terraria providers use TerrariaConfig.
          oneOf:
            - $ref: "#/components/schemas/TerrariaConfig"
        hostPort:
          type: integer
          minimum: 0
          maximum: 65535
          description: External host port. Zero means auto assign.
        resources:
          $ref: "#/components/schemas/ResourceLimits"
    ProviderKey:
      type: string
      enum: [terraria-vanilla, terraria-tmodloader, minecraft-java, palworld, dst]
    GameKey:
      type: string
      enum: [terraria, minecraft, palworld, dst]
    ServerDesiredState:
      type: string
      enum: [running, stopped, deleted]
    ServerPhase:
      type: string
      enum: [pending, reconciling, running, stopped, failed, deleting, deleted]
    ServerActualState:
      type: string
      enum: [running, stopped, missing, unknown]
    GameServer:
      type: object
      required: [id, name, gameKey, providerKey, spec, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        gameKey:
          $ref: "#/components/schemas/GameKey"
        providerKey:
          $ref: "#/components/schemas/ProviderKey"
        spec:
          $ref: "#/components/schemas/ServerSpec"
        status:
          $ref: "#/components/schemas/ServerRuntimeStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ServerSpec:
      type: object
      required: [generation, desiredState]
      properties:
        generation:
          type: integer
          minimum: 1
        desiredState:
          $ref: "#/components/schemas/ServerDesiredState"
        version:
          type: string
        config:
          type: object
          additionalProperties: true
          description: Provider-specific structured configuration payload.
        sourceWorldId:
          type: string
        sourceWorldName:
          type: string
        resources:
          $ref: "#/components/schemas/ResourceLimits"
        network:
          $ref: "#/components/schemas/ServerNetworkSpec"
        runtime:
          $ref: "#/components/schemas/ServerRuntimeSpec"
    ServerNetworkSpec:
      type: object
      properties:
        port:
          type: integer
          minimum: 0
          maximum: 65535
        hostPort:
          type: integer
          minimum: 0
          maximum: 65535
        protocol:
          type: string
          enum: [tcp, udp]
    ServerRuntimeSpec:
      type: object
      properties:
        dataDir:
          type: string
        image:
          type: string
        env:
          type: array
          items:
            type: string
        cmd:
          type: array
          items:
            type: string
    ServerRuntimeStatus:
      type: object
      required: [phase, actualState, observedGeneration, appliedGeneration]
      properties:
        phase:
          $ref: "#/components/schemas/ServerPhase"
        actualState:
          $ref: "#/components/schemas/ServerActualState"
        runtimeId:
          type: string
        playersOnline:
          type: integer
          minimum: 0
        observedGeneration:
          type: integer
          minimum: 0
        appliedGeneration:
          type: integer
          minimum: 0
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/ServerCondition"
        lastError:
          type: string
        lastReconcileAt:
          type: string
          format: date-time
        lastTransitionAt:
          type: string
          format: date-time
    ServerCondition:
      type: object
      required: [type, status, lastTransitionAt]
      properties:
        type:
          type: string
          examples: [RuntimeReady, ConfigApplied, WorkloadStarted, WorkloadStopped, DeleteComplete]
        status:
          type: string
          enum: ["True", "False", Unknown]
        reason:
          type: string
        message:
          type: string
        observedGeneration:
          type: integer
          minimum: 0
        lastTransitionAt:
          type: string
          format: date-time
    ServerStats:
      type: object
      required: [cpuPercent, memoryMb, memoryLimitMb]
      properties:
        cpuPercent:
          type: number
        memoryMb:
          type: number
        memoryLimitMb:
          type: number
    MonitoringDataSource:
      type: object
      required: [kind, connected, endpointConfigured]
      properties:
        kind:
          type: string
          enum: [prometheus]
        connected:
          type: boolean
        endpointConfigured:
          type: boolean
        lastQueryAt:
          type: string
          format: date-time
        error:
          type: string
    MonitoringPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
    MonitoringSeries:
      type: object
      required: [key, title, unit, chartType, points]
      properties:
        key:
          type: string
        title:
          type: string
        unit:
          type: string
        chartType:
          type: string
          enum: [line, area, bar]
        currentValue:
          type: number
        avg:
          type: number
        max:
          type: number
        threshold:
          type: number
        emptyReason:
          type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/MonitoringPoint"
    MonitoringMetrics:
      type: object
      required: [collectedAt, dataSource, series]
      properties:
        collectedAt:
          type: string
          format: date-time
        dataSource:
          $ref: "#/components/schemas/MonitoringDataSource"
        series:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MonitoringSeries"
    MonitoringOverview:
      type: object
      required: [collectedAt, dataSource, health, kpis]
      properties:
        collectedAt:
          type: string
          format: date-time
        dataSource:
          $ref: "#/components/schemas/MonitoringDataSource"
        health:
          type: object
        kpis:
          type: object
          properties:
            totalServers:
              type: integer
            runningServers:
              type: integer
            issues:
              type: integer
            onlinePlayers:
              type: integer
            playerCapacity:
              type: integer
            resourceUsagePercent:
              type: integer
            storageBytes:
              type: integer
    ServerLoadResponse:
      type: object
      required: [collectedAt, dataSource, rows]
      properties:
        collectedAt:
          type: string
          format: date-time
        dataSource:
          $ref: "#/components/schemas/MonitoringDataSource"
        rows:
          type: array
          items:
            type: object
    MonitoringEvents:
      type: object
      required: [collectedAt, events]
      properties:
        collectedAt:
          type: string
          format: date-time
        events:
          type: array
          items:
            type: object
    PlatformMonitoring:
      type: object
      required: [collectedAt, dataSource, services, series, topRoutes]
      properties:
        collectedAt:
          type: string
          format: date-time
        dataSource:
          $ref: "#/components/schemas/MonitoringDataSource"
        services:
          type: array
          items:
            type: object
        series:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MonitoringSeries"
        topRoutes:
          type: array
          items:
            type: object
            required: [route, method, requestCount, requestRate, errorRate, p95Ms]
            properties:
              route:
                type: string
              method:
                type: string
              requestCount:
                type: number
              requestRate:
                type: number
              errorRate:
                type: number
              p95Ms:
                type: number
    ResourceLimits:
      type: object
      description: Optional maximum resources for one game server container. Zero means unlimited.
      properties:
        cpuLimitCores:
          type: number
          minimum: 0
          maximum: 64
          description: Maximum CPU cores. Zero means Docker default/unlimited.
        memoryLimitMb:
          type: integer
          minimum: 0
          maximum: 262144
          description: Maximum memory in MB. Zero means Docker default/unlimited.
    LogSnapshot:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          items:
            type: string
    ModFile:
      type: object
      required: [id, instanceId, fileName, sizeBytes, enabled, createdAt]
      properties:
        id:
          type: string
        instanceId:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
          format: int64
        enabled:
          type: boolean
        source:
          type: string
          enum: [upload, workshop]
          description: Upload means a .tmod file; workshop means an independent Steam Workshop item.
        workshopId:
          type: string
          description: Steam Workshop item ID when source is workshop.
        createdAt:
          type: string
          format: date-time
    TerrariaConfig:
      type: object
      required: [worldName, worldSize, worldEvil, difficulty, maxPlayers, port, secure, autoCreateWorld]
      properties:
        serverName:
          type: string
        worldName:
          type: string
        worldSize:
          type: string
          enum: [small, medium, large]
        worldEvil:
          type: string
          enum: [random, corruption, crimson]
        difficulty:
          type: string
          enum: [journey, classic, expert, master]
        maxPlayers:
          type: integer
          minimum: 1
          maximum: 255
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        password:
          type: string
        motd:
          type: string
        seed:
          type: string
        specialSeeds:
          type: array
          description: Terraria 1.4.5+ Special world seed mode codes selected during world creation.
          items:
            type: string
        secretSeeds:
          type: array
          description: Terraria 1.4.5+ Secret world seed mode codes selected during world creation.
          items:
            type: string
        secure:
          type: boolean
        language:
          type: string
          default: en-US
          description: Fixed to en-US by the backend in V1 so console commands stay consistent with Terraria/tModLoader originals.
        autoCreateWorld:
          type: boolean
