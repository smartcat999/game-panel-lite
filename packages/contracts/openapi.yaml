openapi: 3.1.0
info:
  title: GamePanel Lite API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/version:
    get:
      summary: Product version
      responses:
        "200":
          description: Product version
  /api/runtime/docker:
    get:
      summary: Check Docker runtime availability
      responses:
        "200":
          description: Docker status
  /api/servers:
    get:
      summary: List servers
      responses:
        "200":
          description: Server list
    post:
      summary: Create server
      responses:
        "201":
          description: Created server
  /api/servers/{id}:
    get:
      summary: Get server
      responses:
        "200":
          description: Server detail
    delete:
      summary: Delete server
      responses:
        "200":
          description: Deleted
  /api/servers/{id}/start:
    post:
      summary: Start server
      responses:
        "200":
          description: Started server
  /api/servers/{id}/stop:
    post:
      summary: Stop server
      responses:
        "200":
          description: Stopped server
  /api/servers/{id}/restart:
    post:
      summary: Restart server
      responses:
        "200":
          description: Restarted server
  /api/servers/{id}/logs:
    get:
      summary: Stream server logs with SSE
      responses:
        "200":
          description: SSE log stream
  /api/servers/{id}/mods:
    get:
      summary: List tModLoader mods
      responses:
        "200":
          description: Mod list
  /api/servers/{id}/mods/upload:
    post:
      summary: Upload tModLoader mod metadata or .tmod file
      responses:
        "201":
          description: Uploaded mod file
  /api/servers/{id}/mods/{modId}:
    delete:
      summary: Delete tModLoader mod file
      responses:
        "200":
          description: Deleted mod
  /api/terraria/presets:
    get:
      summary: List Terraria server presets
      responses:
        "200":
          description: Presets
  /api/terraria/config/preview:
    post:
      summary: Render serverconfig.txt preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  $ref: "#/components/schemas/TerrariaConfig"
      responses:
        "200":
          description: Rendered config
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverconfig:
                    type: string
        "400":
          description: Invalid config
components:
  schemas:
    TerrariaConfig:
      type: object
      required: [worldName, worldSize, difficulty, maxPlayers, port, secure, language, autoCreateWorld]
      properties:
        serverName:
          type: string
        worldName:
          type: string
        worldSize:
          type: string
          enum: [small, medium, large]
        difficulty:
          type: string
          enum: [journey, classic, expert, master]
        maxPlayers:
          type: integer
          minimum: 1
          maximum: 255
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        password:
          type: string
        motd:
          type: string
        seed:
          type: string
        secure:
          type: boolean
        language:
          type: string
        autoCreateWorld:
          type: boolean
