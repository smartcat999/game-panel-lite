openapi: 3.1.0
info:
  title: GamePanel Lite API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/version:
    get:
      summary: Product version
      responses:
        "200":
          description: Product version
  /api/runtime/docker:
    get:
      summary: Read cached Docker runtime availability
      responses:
        "200":
          description: Docker status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DockerStatus"
  /api/runtime/docker/hosts:
    get:
      summary: List Docker host candidates
      responses:
        "200":
          description: Docker host candidates
  /api/runtime/docker/host:
    post:
      summary: Hot-apply Docker host
      responses:
        "200":
          description: Docker status after reconnect
  /api/settings:
    get:
      summary: Read local API settings
      responses:
        "200":
          description: Local settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      summary: Update allowed local API settings
      responses:
        "200":
          description: Updated local settings
  /api/activity:
    get:
      summary: List recent activity events
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
  /api/servers:
    get:
      summary: List servers
      responses:
        "200":
          description: Server list
    post:
      summary: Create server
      responses:
        "201":
          description: Created server
  /api/servers/{id}:
    get:
      summary: Get server
      responses:
        "200":
          description: Server detail
    delete:
      summary: Delete server
      responses:
        "200":
          description: Deleted
  /api/servers/{id}/start:
    post:
      summary: Start server, creating a runtime container from persisted config and data when needed
      responses:
        "200":
          description: Started server
  /api/servers/{id}/stop:
    post:
      summary: Stop server
      responses:
        "200":
          description: Stopped server
  /api/servers/{id}/restart:
    post:
      summary: Restart server, creating a runtime container from persisted config and data when needed
      responses:
        "200":
          description: Restarted server
  /api/servers/{id}/command:
    post:
      summary: Send a console command to a running server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  maxLength: 200
      responses:
        "200":
          description: Command sent
        "409":
          description: Server is not running
  /api/servers/{id}/logs:
    get:
      summary: Stream server logs with SSE
      responses:
        "200":
          description: SSE log stream
  /api/servers/{id}/mods:
    get:
      summary: List tModLoader mods
      responses:
        "200":
          description: Mod list
  /api/servers/{id}/mods/upload:
    post:
      summary: Upload tModLoader mod metadata or .tmod file
      responses:
        "201":
          description: Uploaded mod file
  /api/servers/{id}/mods/{modId}:
    delete:
      summary: Delete tModLoader mod file
      responses:
        "200":
          description: Deleted mod
  /api/worlds:
    get:
      summary: List worlds
      responses:
        "200":
          description: World list
  /api/worlds/import:
    post:
      summary: Import .wld world file
      responses:
        "201":
          description: Imported world
  /api/worlds/{id}/assign:
    post:
      summary: Assign world to server
      responses:
        "200":
          description: Assigned world
  /api/worlds/{id}/download:
    get:
      summary: Download world file
      responses:
        "200":
          description: World file
  /api/worlds/{id}/duplicate:
    post:
      summary: Duplicate world file
      responses:
        "201":
          description: Duplicated world
  /api/worlds/{id}/migrate:
    post:
      summary: Migrate world file to another server instance
      responses:
        "201":
          description: Migrated world
  /api/worlds/{id}:
    delete:
      summary: Delete world file
      responses:
        "200":
          description: Deleted world
  /api/backups:
    get:
      summary: List backups
      responses:
        "200":
          description: Backup list
  /api/servers/{id}/backups:
    post:
      summary: Create manual backup
      responses:
        "201":
          description: Created backup
  /api/backups/{id}/restore:
    post:
      summary: Restore backup
      responses:
        "200":
          description: Restored backup
  /api/backups/{id}/migrate:
    post:
      summary: Migrate backup archive to another server instance
      responses:
        "201":
          description: Migrated backup
  /api/backups/{id}/download:
    get:
      summary: Download backup archive
      responses:
        "200":
          description: Backup archive
  /api/backups/{id}:
    delete:
      summary: Delete backup
      responses:
        "200":
          description: Deleted backup
  /api/terraria/presets:
    get:
      summary: List Terraria server presets
      responses:
        "200":
          description: Presets
  /api/terraria/config/preview:
    post:
      summary: Render serverconfig.txt preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  $ref: "#/components/schemas/TerrariaConfig"
      responses:
        "200":
          description: Rendered config
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverconfig:
                    type: string
        "400":
          description: Invalid config
components:
  schemas:
    DockerStatus:
      type: object
      required: [available, message, host, lastCheckedAt]
      properties:
        available:
          type: boolean
        message:
          type: string
        host:
          type: string
        lastCheckedAt:
          type: string
          format: date-time
    AppSettings:
      type: object
      required: [host, port, dataDir, dbPath, dockerHost]
      properties:
        host:
          type: string
        port:
          type: string
        dataDir:
          type: string
        dbPath:
          type: string
        dockerHost:
          type: string
    ActivityEvent:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: string
        instanceId:
          type: string
        type:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
    TerrariaConfig:
      type: object
      required: [worldName, worldSize, difficulty, maxPlayers, port, secure, language, autoCreateWorld]
      properties:
        serverName:
          type: string
        worldName:
          type: string
        worldSize:
          type: string
          enum: [small, medium, large]
        difficulty:
          type: string
          enum: [journey, classic, expert, master]
        maxPlayers:
          type: integer
          minimum: 1
          maximum: 255
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        password:
          type: string
        motd:
          type: string
        seed:
          type: string
        secure:
          type: boolean
        language:
          type: string
        autoCreateWorld:
          type: boolean
