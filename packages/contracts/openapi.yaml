openapi: 3.1.0
info:
  title: GamePanel Lite API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/version:
    get:
      summary: Product version
      responses:
        "200":
          description: Product version
  /api/terraria/presets:
    get:
      summary: List Terraria server presets
      responses:
        "200":
          description: Presets
  /api/terraria/config/preview:
    post:
      summary: Render serverconfig.txt preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  $ref: "#/components/schemas/TerrariaConfig"
      responses:
        "200":
          description: Rendered config
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverconfig:
                    type: string
        "400":
          description: Invalid config
components:
  schemas:
    TerrariaConfig:
      type: object
      required: [worldName, worldSize, difficulty, maxPlayers, port, secure, language, autoCreateWorld]
      properties:
        serverName:
          type: string
        worldName:
          type: string
        worldSize:
          type: string
          enum: [small, medium, large]
        difficulty:
          type: string
          enum: [journey, classic, expert, master]
        maxPlayers:
          type: integer
          minimum: 1
          maximum: 255
        port:
          type: integer
          minimum: 1024
          maximum: 65535
        password:
          type: string
        motd:
          type: string
        seed:
          type: string
        secure:
          type: boolean
        language:
          type: string
        autoCreateWorld:
          type: boolean
