global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: gamepanel-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: gamepanel-observability
    metrics_path: /api/observability/prometheus
    static_configs:
      - targets: ["api:4000"]

  - job_name: gamepanel-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["gamepanel-exporter:4010"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]
